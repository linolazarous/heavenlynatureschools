services:
  - type: web
    name: hns-api
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: hnsdb
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ADMIN_EMAIL
        value: admin@heavenlynatureschools.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: SCHOOL_NAME
        value: Heavenly Nature Nursery & Primary School
      - key: SCHOOL_MOTTO
        value: Nurturing Right Leaders
      - key: ALLOWED_ORIGINS
        value: '["http://localhost:5173","https://hns-frontend.vercel.app"]'
      - key: LOG_LEVEL
        value: INFO
